<h1>Weather Forecast</h1>
@if (forecasts().length > 0) {
<table>
  <thead>
    <tr>
      <th>Date</th>
      <th>Temp (C)</th>
      <th>Temp (F)</th>
      <th>Summary</th>
    </tr>
  </thead>
  <tbody>
    @for (f of forecasts(); track f.date) {
    <tr>
      <td>{{ f.date }}</td>
      <td>{{ f.temperatureC }}</td>
      <td>{{ f.temperatureF }}</td>
      <td>{{ f.summary }}</td>
    </tr>
    }
  </tbody>
</table>
}

<router-outlet />
